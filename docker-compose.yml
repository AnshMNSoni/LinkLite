version: "3.9"

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: linklite
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 9825466186
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    env_file:
      - ./backend/.env